name: verify

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    env:
      OPENSSL_VERSION: "3.5.0"
      OPENSSL_PREFIX: ${{ runner.temp }}/openssl-3.5.0
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y perl

      - name: Cache OpenSSL
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: ${{ env.OPENSSL_PREFIX }}
          key: openssl-${{ env.OPENSSL_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Build OpenSSL
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: sh ci/build_openssl.sh

      - name: Verify
        run: make clean all verify OPENSSL_PREFIX="${OPENSSL_PREFIX}"

      - name: Portable fuzz run
        run: make fuzz-run FUZZ_RUNS=5000 OPENSSL_PREFIX="${OPENSSL_PREFIX}"

  nightly-fuzz:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      OPENSSL_VERSION: "3.5.0"
      OPENSSL_PREFIX: ${{ runner.temp }}/openssl-3.5.0
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y perl

      - name: Cache OpenSSL
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: ${{ env.OPENSSL_PREFIX }}
          key: openssl-${{ env.OPENSSL_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Build OpenSSL
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: sh ci/build_openssl.sh

      - name: Nightly verify
        run: make clean all verify OPENSSL_PREFIX="${OPENSSL_PREFIX}"

      - name: Extended fuzz run
        run: make fuzz-run FUZZ_RUNS=20000 OPENSSL_PREFIX="${OPENSSL_PREFIX}"
